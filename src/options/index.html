<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 사전 설정</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main>
      <h1>AI 사전 설정</h1>

      <section>
        <h2>백엔드</h2>
        <label class="field">
          <span>사용할 백엔드</span>
          <select id="backend">
            <option value="gemini">Gemini (Google 본인 키)</option>
            <option value="mindlogic">Mindlogic Gateway (학교/조직 키)</option>
          </select>
        </label>
      </section>

      <section id="sec-gemini">
        <h2>Gemini</h2>
        <label class="field">
          <span>API 키</span>
          <input id="gemini-key" type="password" placeholder="AIza..." autocomplete="off" />
        </label>
        <label class="field">
          <span>모델</span>
          <select id="gemini-model"></select>
        </label>
        <div class="actions">
          <button type="button" id="gemini-test">키 테스트</button>
          <button type="button" id="gemini-refresh">모델 새로고침</button>
          <span id="gemini-test-result" class="result"></span>
        </div>
      </section>

      <section id="sec-mindlogic">
        <h2>Mindlogic</h2>
        <label class="field">
          <span>API 키</span>
          <input id="mindlogic-key" type="password" placeholder="Bearer 토큰" autocomplete="off" />
        </label>
        <label class="field">
          <span>모델</span>
          <select id="mindlogic-model"></select>
        </label>
        <div class="actions">
          <button type="button" id="mindlogic-test">키 테스트</button>
          <button type="button" id="mindlogic-refresh">모델 새로고침</button>
          <span id="mindlogic-test-result" class="result"></span>
        </div>
      </section>

      <section>
        <h2>사전 프롬프트</h2>
        <p class="hint">AI에게 답변 형식을 지시하는 system 프롬프트. 입력한 단어·질문은 이 지시에 따라 답변됩니다.</p>
        <textarea id="prompt" rows="12"></textarea>
        <div class="actions">
          <button type="button" id="prompt-reset">기본값으로</button>
        </div>
      </section>

      <p class="hint">
        팝업 단축키는 <code>chrome://extensions/shortcuts</code> 에서 바꿀 수 있습니다 (기본 Ctrl+Shift+Y).
        모든 변경은 자동 저장됩니다.
      </p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
