<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 사전</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <form id="ask-form">
        <textarea
          id="input"
          rows="2"
          placeholder="단어·표현·질문 입력 후 Enter (Shift+Enter 줄바꿈)"
          autofocus
        ></textarea>
        <div class="row">
          <span id="meta" class="meta"></span>
          <div class="actions">
            <button type="button" id="reset-btn" class="btn-secondary">🔄 새로고침</button>
            <button type="submit" id="ask-btn">물어보기</button>
          </div>
        </div>
      </form>
      <div id="notice" class="notice" hidden></div>
      <div id="toolbar" class="toolbar" hidden>
        <button type="button" id="copy-btn" class="link">📋 복사</button>
        <button type="button" id="notion-btn" class="link">💾 Notion 저장</button>
      </div>
      <div id="answer" class="answer"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
